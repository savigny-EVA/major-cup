<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savigny Major Cup — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050509;--bg2:#0a0a16;--bg3:#111122;--bg4:#1a1a30;
  --cyan:#00e5ff;--mag:#ff0099;--gold:#ffd600;--grn:#00ff88;--red:#ff3355;
  --silver:#c0c0d0;--bronze:#cd7f32;--org:#ff8800;
  --txt:#e8e8f4;--mut:#555580;--brd:rgba(255,255,255,.05);
  --row-h:58px;--font:'Barlow Condensed',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--font)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(0,229,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(255,0,153,.04) 0%,transparent 50%);pointer-events:none}

#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading.hid{display:none}
#loading h1{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;letter-spacing:6px;color:var(--gold)}
#loading p{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--mut);letter-spacing:2px;animation:ldP 1.5s ease-in-out infinite}
@keyframes ldP{0%,100%{opacity:.4}50%{opacity:1}}

#app{display:none;height:100vh;width:100vw;overflow:hidden;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

.topbar{height:68px;min-height:68px;background:var(--bg2);border-bottom:2px solid rgba(255,214,0,.1);display:flex;align-items:center;justify-content:space-between;padding:0 36px}
.tb-l{display:flex;flex-direction:column}
.tb-l .t1{font-family:'Orbitron',sans-serif;font-size:1.15rem;font-weight:900;letter-spacing:5px;color:var(--gold);text-shadow:0 0 20px rgba(255,214,0,.2)}
.tb-l .t2{font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .ph{font-family:'Orbitron',sans-serif;font-size:.85rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.topbar .clk{font-family:'Share Tech Mono',monospace;font-size:1.3rem;color:var(--cyan)}
.topbar .eta{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--mut);letter-spacing:1px}

.nav{height:46px;min-height:46px;background:var(--bg);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 36px;gap:5px}
.nb{font-family:var(--font);font-weight:700;font-size:.95rem;letter-spacing:2px;text-transform:uppercase;padding:7px 20px;border:1px solid var(--brd);border-radius:5px;background:transparent;color:var(--mut);cursor:pointer;transition:all .15s}
.nb:hover{border-color:rgba(0,229,255,.3);color:var(--txt)}
.nb.on{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.4);color:var(--cyan)}

.content{flex:1;overflow:hidden;position:relative}
.vw{position:absolute;inset:0;overflow-y:auto;padding:20px 36px;display:none}
.vw.on{display:block}
.vw::-webkit-scrollbar{width:5px}
.vw::-webkit-scrollbar-thumb{background:rgba(0,229,255,.12);border-radius:3px}

/* 4 POOLS GRID */
.pools-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pool-card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden}
.pool-hdr{padding:10px 18px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.pool-hdr.pa{background:linear-gradient(135deg,rgba(0,229,255,.1),transparent);border-bottom:2px solid rgba(0,229,255,.1);color:var(--cyan)}
.pool-hdr.pb{background:linear-gradient(135deg,rgba(255,0,153,.1),transparent);border-bottom:2px solid rgba(255,0,153,.1);color:var(--mag)}
.pool-hdr.pc{background:linear-gradient(135deg,rgba(0,255,136,.1),transparent);border-bottom:2px solid rgba(0,255,136,.1);color:var(--grn)}
.pool-hdr.pd{background:linear-gradient(135deg,rgba(255,136,0,.1),transparent);border-bottom:2px solid rgba(255,136,0,.1);color:var(--org)}
.pool-hdr .cnt{font-family:'Share Tech Mono',monospace;font-size:.65rem;opacity:.5}

.st-hdr{display:grid;grid-template-columns:36px 1fr 42px 42px 48px 48px 48px 52px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:.45rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--brd);background:var(--bg2)}
.st-hdr span{text-align:center}
.st-hdr span:nth-child(2){text-align:left}

.st-body{position:relative}

.st-row{display:grid;grid-template-columns:36px 1fr 42px 42px 48px 48px 48px 52px;padding:0 14px;height:var(--row-h);align-items:center;font-size:1.1rem;font-weight:700;border-bottom:1px solid var(--brd);position:absolute;left:0;right:0;transition:transform .8s cubic-bezier(.3,0,.15,1),background .5s;will-change:transform}
.st-row span{text-align:center}
.st-row span:nth-child(2){text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:1.15rem;font-weight:800;letter-spacing:.5px}
.st-row .rk{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:800;color:var(--mut)}
.st-row .pv{color:var(--gold);font-weight:900;font-size:1.25rem;text-shadow:0 0 6px rgba(255,214,0,.3)}
.st-row .stat{font-family:'Share Tech Mono',monospace;font-size:.95rem}
.st-row .rw-v{color:var(--grn)}.st-row .rl-v{color:var(--red)}
.st-row.q{background:rgba(0,255,136,.04)}
.st-row.q .rk{color:var(--grn);text-shadow:0 0 6px rgba(0,255,136,.3)}

@keyframes rowFlash{0%{background:rgba(0,229,255,.2)}100%{background:transparent}}
.st-row.flash{animation:rowFlash 1.8s ease-out}
.st-row.q.flash{animation:rowFlashQ 1.8s ease-out}
@keyframes rowFlashQ{0%{background:rgba(0,255,136,.25)}100%{background:rgba(0,255,136,.04)}}
.rank-change{font-size:.6rem;margin-left:4px;display:inline-block;animation:fadeA 3s ease-out forwards}
.rank-up{color:var(--grn)}.rank-down{color:var(--red)}
@keyframes fadeA{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* BRACKET */
.br{margin-bottom:20px}
.br-t{font-family:'Orbitron',sans-serif;font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.br-g{display:flex;gap:12px;flex-wrap:wrap}
.bm{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;min-width:260px;flex:1;max-width:380px}
.bm-l{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--mut);margin-bottom:5px}
.bm-t{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-radius:5px;background:var(--bg3);font-size:1.1rem;font-weight:800;margin-bottom:3px;letter-spacing:.5px}
.bm-t.w{background:rgba(0,255,136,.12);color:var(--grn)}
.bm-t .sc{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--gold)}
.bm-m{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.5rem;color:var(--mut);padding:1px 0}
.glow{height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--mag),transparent);margin:18px 0;opacity:.2}

.podium{display:flex;justify-content:center;align-items:flex-end;gap:20px;margin-top:36px}
.podium-spot{text-align:center;border-radius:10px 10px 0 0;padding:20px 30px 14px;min-width:180px}
.podium-spot .p-r{font-family:'Orbitron',sans-serif;font-size:2.4rem;font-weight:900;display:block;line-height:1}
.podium-spot .p-n{font-size:1.3rem;font-weight:900;margin-top:6px;display:block;letter-spacing:1px}
.podium-spot .p-l{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;margin-top:3px;display:block}
.p1{background:linear-gradient(180deg,rgba(255,214,0,.2),rgba(255,214,0,.05));border:1px solid rgba(255,214,0,.3);border-bottom:none;height:190px;order:2}
.p1 .p-r{color:var(--gold);text-shadow:0 0 30px rgba(255,214,0,.6)}.p1 .p-n{color:var(--gold)}.p1 .p-l{color:rgba(255,214,0,.6)}
.p2{background:linear-gradient(180deg,rgba(192,192,208,.12),rgba(192,192,208,.03));border:1px solid rgba(192,192,208,.2);border-bottom:none;height:155px;order:1}
.p2 .p-r{color:var(--silver);text-shadow:0 0 20px rgba(192,192,208,.5)}.p2 .p-n{color:var(--silver)}.p2 .p-l{color:rgba(192,192,208,.5)}
.p3{background:linear-gradient(180deg,rgba(205,127,50,.15),rgba(205,127,50,.04));border:1px solid rgba(205,127,50,.2);border-bottom:none;height:125px;order:3}
.p3 .p-r{color:var(--bronze);text-shadow:0 0 20px rgba(205,127,50,.5)}.p3 .p-n{color:var(--bronze)}.p3 .p-l{color:rgba(205,127,50,.5)}
.pod-title{text-align:center;font-family:'Orbitron',sans-serif;font-size:1.5rem;letter-spacing:6px;color:var(--gold);text-shadow:0 0 30px rgba(255,214,0,.5);margin-top:24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>

<div id="loading"><h1>SAVIGNY MAJOR CUP</h1><p>En attente du lancement...</p></div>

<div id="app">
  <div class="topbar">
    <div class="tb-l"><div class="t1">SAVIGNY MAJOR CUP</div><div class="t2">EVA SENART LEAGUE</div></div>
    <div class="ph" id="phL">PHASE DE POULES</div>
    <div style="text-align:right"><div class="clk" id="clk"></div><div class="eta" id="eta">Fin estimée : ~17h56</div></div>
  </div>
  <div class="nav">
    <button class="nb on" data-v="S">Classements</button>
    <button class="nb" data-v="W">Winner Bracket</button>
    <button class="nb" data-v="L">Loser Bracket</button>
    <button class="nb" data-v="F">Finales</button>
  </div>
  <div class="content">
    <div class="vw on" id="vS"></div>
    <div class="vw" id="vW"></div>
    <div class="vw" id="vL"></div>
    <div class="vw" id="vF"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyAJ5VS2HQTguUaOS6RmFocVz3FY0kC7M74",
  authDomain:"savigny-major-cup.firebaseapp.com",
  databaseURL:"https://savigny-major-cup-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"savigny-major-cup",
  storageBucket:"savigny-major-cup.firebasestorage.app",
  messagingSenderId:"739304547260",
  appId:"1:739304547260:web:10b130b42d3f859b9ac1b9"
});
const db=getDatabase(app);
const ROW_H=58;
const POOLS=['A','B','C','D'];
const POOL_COLORS={A:'pa',B:'pb',C:'pc',D:'pd'};
let state=null,prevRank={A:{},B:{},C:{},D:{}},flashTeams=new Set();

// Nav
document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));this.classList.add('on');
  document.querySelectorAll('.vw').forEach(v=>v.classList.remove('on'));
  document.getElementById('v'+this.dataset.v).classList.add('on');
  const lb={S:'PHASE DE POULES',W:'WINNER BRACKET',L:'LOSER BRACKET',F:'FINALES'};
  document.getElementById('phL').textContent=lb[this.dataset.v]||'';
}));

// Clock
(function(){const e=document.getElementById('clk');const u=()=>{const d=new Date();e.textContent=`${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`};u();setInterval(u,10000)})();

// Listen
onValue(ref(db,'tournament'),snap=>{
  const d=snap.val();
  if(!d||!d.started){document.getElementById('loading').classList.remove('hid');document.getElementById('app').classList.remove('on');return}
  document.getElementById('loading').classList.add('hid');document.getElementById('app').classList.add('on');

  // Detect flash
  if(state&&state.sta&&d.sta){
    POOLS.forEach(p=>{
      if(!state.sta[p]||!d.sta[p])return;
      Object.keys(d.sta[p]).forEach(t=>{
        if(!state.sta[p][t])return;
        if(JSON.stringify(state.sta[p][t])!==JSON.stringify(d.sta[p][t]))flashTeams.add(t);
      });
    });
  }

  const wasNull=!state;
  state=d;
  if(wasNull){POOLS.forEach(p=>{prevRank[p]={};if(state.pools&&state.pools[p])state.pools[p].forEach((t,i)=>{prevRank[p][t]=i})})}
  renderStandings();renderWB();renderLB();renderFinals();
});

function gS(pid){
  if(!state||!state.sta||!state.sta[pid])return[];
  return Object.entries(state.sta[pid]).sort((a,b)=>{
    if(b[1].pts!==a[1].pts)return b[1].pts-a[1].pts;
    if(b[1].mw!==a[1].mw)return b[1].mw-a[1].mw;
    const da=(a[1].pctFor||0)-(a[1].pctAg||0),db=(b[1].pctFor||0)-(b[1].pctAg||0);
    if(Math.abs(db-da)>0.01)return db-da;
    return(b[1].pctFor||0)-(a[1].pctFor||0);
  });
}

// ============================================================
// STANDINGS
// ============================================================
function renderStandings(){
  if(!state||!state.pools)return;
  const v=document.getElementById('vS');
  if(!document.getElementById('sBody_A')){
    v.innerHTML=`<div class="pools-grid">${POOLS.map(p=>{
      const pool=state.pools[p]||[];
      const matches=state.matches?state.matches[p]||[]:[];
      const done=matches.filter(m=>m.done).length;
      return`<div class="pool-card"><div class="pool-hdr ${POOL_COLORS[p]}"><span>POULE ${p}</span><span class="cnt" id="cnt${p}">${done}/${matches.length}</span></div>
        <div class="st-hdr"><span>#</span><span>ÉQUIPE</span><span>V</span><span>D</span><span>MW</span><span>ML</span><span>%±</span><span>PTS</span></div>
        <div class="st-body" id="sBody_${p}" style="height:${pool.length*ROW_H}px"></div>
      </div>`;
    }).join('')}</div>`;
    POOLS.forEach(p=>{const pool=state.pools[p]||[];createRows('sBody_'+p,p,pool)});
  }
  POOLS.forEach(p=>{
    const matches=state.matches?state.matches[p]||[]:[];
    const done=matches.filter(m=>m.done).length;
    const ce=document.getElementById('cnt'+p);if(ce)ce.textContent=`${done}/${matches.length}`;
    animateRanks(p);
  });
}

function createRows(cid,pid,pool){
  const c=document.getElementById(cid);if(!c)return;
  pool.forEach((name,i)=>{
    const row=document.createElement('div');row.className='st-row';
    row.id=`row-${pid}-${name.replace(/[^a-zA-Z0-9]/g,'_')}`;
    row.style.transform=`translateY(${i*ROW_H}px)`;
    row.innerHTML=rowHTML(name,state.sta[pid][name]||{w:0,l:0,pts:0,mw:0,ml:0,pctFor:0,pctAg:0},i);
    c.appendChild(row);
  });
}

function rowHTML(name,d,rank){
  const pctDiff=((d.pctFor||0)-(d.pctAg||0)).toFixed(0);
  const q=rank<2;
  return`<span class="rk">${rank+1}</span>
    <span>${name}${q?' <span style="color:var(--grn);font-size:.7rem">✦</span>':''}</span>
    <span class="stat">${d.w}</span><span class="stat">${d.l}</span>
    <span class="stat rw-v">${d.mw||0}</span><span class="stat rl-v">${d.ml||0}</span>
    <span class="stat" style="color:${pctDiff>=0?'var(--grn)':'var(--red)'};font-size:.85rem">${pctDiff>0?'+':''}${pctDiff}</span>
    <span class="pv">${d.pts}</span>`;
}

function animateRanks(pid){
  const sorted=gS(pid);const prev=prevRank[pid];
  sorted.forEach(([name,d],ni)=>{
    const rid=`row-${pid}-${name.replace(/[^a-zA-Z0-9]/g,'_')}`;
    const row=document.getElementById(rid);if(!row)return;
    const oi=prev[name]!==undefined?prev[name]:ni;
    const isF=flashTeams.has(name);
    row.innerHTML=rowHTML(name,d,ni);
    if(oi!==ni&&isF){const rk=row.querySelector('.rk');const delta=oi-ni;rk.innerHTML+=delta>0?`<span class="rank-change rank-up">▲${delta}</span>`:`<span class="rank-change rank-down">▼${Math.abs(delta)}</span>`}
    row.style.transform=`translateY(${ni*ROW_H}px)`;
    row.className='st-row'+(ni<2?' q':'');
    if(isF){row.classList.add('flash');setTimeout(()=>row.classList.remove('flash'),2000)}
    prev[name]=ni;
  });
  flashTeams.clear();
}

// ============================================================
// BRACKETS
// ============================================================
function rb(m){
  if(!m||!m.tA)return`<div class="bm"><div class="bm-l">${m&&m.l?m.l:'—'}</div><div class="bm-t" style="color:var(--mut)">TBD</div><div class="bm-m">VS</div><div class="bm-t" style="color:var(--mut)">TBD</div></div>`;
  const wA=m.done&&m.sA>m.sB,wB=m.done&&m.sB>m.sA;
  return`<div class="bm"><div class="bm-l">${m.l||''}</div>
    <div class="bm-t${wA?' w':''}"><span>${m.tA}</span>${m.done?`<span class="sc">${m.sA}</span>`:''}</div>
    <div class="bm-m">VS</div>
    <div class="bm-t${wB?' w':''}"><span>${m.tB||'TBD'}</span>${m.done?`<span class="sc">${m.sB}</span>`:''}</div></div>`;
}

function renderWB(){
  const v=document.getElementById('vW');
  if(!state||!state.wb||!state.wb.qf||!state.wb.qf[0]){v.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mut);font-family:'Orbitron',sans-serif;font-size:.9rem;letter-spacing:4px;text-align:center">TERMINEZ LES POULES<br>POUR DÉBLOQUER LE BRACKET</div>`;return}
  const w=state.wb;
  v.innerHTML=`
    <div class="br"><div class="br-t" style="color:var(--grn)">QUARTS DE FINALE</div><div class="br-g">${w.qf.map(m=>rb(m)).join('')}</div></div><div class="glow"></div>
    <div class="br"><div class="br-t" style="color:var(--grn)">DEMI-FINALES</div><div class="br-g">${w.sf.map(m=>rb(m)).join('')}</div></div><div class="glow"></div>
    <div class="br"><div class="br-t" style="color:var(--gold)">FINALE WINNER BRACKET</div><div class="br-g">${rb(w.fi)}</div></div>`;
}

function renderLB(){
  const v=document.getElementById('vL');
  if(!state||!state.lb||!state.lb.r1||!state.lb.r1[0]){v.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mut);font-family:'Orbitron',sans-serif;font-size:.9rem;letter-spacing:4px;text-align:center">EN ATTENTE DU BRACKET</div>`;return}
  const l=state.lb;
  v.innerHTML=`
    <div class="br"><div class="br-t" style="color:var(--org)">LB ROUND 1</div><div class="br-g">${l.r1.map(m=>rb(m)).join('')}</div></div><div class="glow"></div>
    <div class="br"><div class="br-t" style="color:var(--org)">LB ROUND 2</div><div class="br-g">${l.r2.map(m=>rb(m)).join('')}</div></div><div class="glow"></div>
    <div class="br"><div class="br-t" style="color:var(--org)">LB DEMI-FINALE</div><div class="br-g">${rb(l.sf)}</div></div><div class="glow"></div>
    <div class="br"><div class="br-t" style="color:var(--org)">LB FINALE</div><div class="br-g">${rb(l.fi)}</div></div>`;
}

function renderFinals(){
  const v=document.getElementById('vF');
  if(!state||!state.finals){v.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mut);font-family:'Orbitron',sans-serif;font-size:.9rem;letter-spacing:4px;text-align:center">EN ATTENTE DES FINALES</div>`;return}
  const f=state.finals;
  let first=null,second=null,third=null;
  if(f.gf&&f.gf.done){first=f.gf.sA>f.gf.sB?f.gf.tA:f.gf.tB;second=f.gf.sA>f.gf.sB?f.gf.tB:f.gf.tA}
  if(f.pf&&f.pf.done){third=f.pf.sA>f.pf.sB?f.pf.tA:f.pf.tB}
  v.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div class="br"><div class="br-t" style="color:var(--bronze)">PETITE FINALE — 3ÈME PLACE</div><div class="br-g">${rb(f.pf)}</div></div>
      <div class="br"><div class="br-t" style="color:var(--gold)">★ GRANDE FINALE</div><div class="br-g">${rb(f.gf)}</div></div>
    </div>
    ${first&&third?`<div class="glow"></div>
      <div class="pod-title">🏆 SAVIGNY MAJOR CUP — PODIUM 🏆</div>
      <div class="podium">
        <div class="podium-spot p2"><span class="p-r">2</span><span class="p-n">${second}</span><span class="p-l">Finaliste</span></div>
        <div class="podium-spot p1"><span class="p-r">1</span><span class="p-n">${first}</span><span class="p-l">Champion</span></div>
        <div class="podium-spot p3"><span class="p-r">3</span><span class="p-n">${third}</span><span class="p-l">3ème place</span></div>
      </div>`:''}`;
}
</script>
