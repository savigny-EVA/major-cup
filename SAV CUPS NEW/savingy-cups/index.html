<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savigny Major Cup — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050509;--bg2:#0a0a16;--bg3:#111122;--bg4:#1a1a30;
  --cyan:#00e5ff;--mag:#ff0099;--gold:#ffd600;--grn:#00ff88;--red:#ff3355;
  --silver:#c0c0d0;--bronze:#cd7f32;
  --txt:#e8e8f4;--mut:#555580;--brd:rgba(255,255,255,.05);
  --row-h:68px;
  --font:'Barlow Condensed',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--font)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(0,229,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(255,0,153,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading.hidden{display:none}
#loading h1{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;letter-spacing:6px;color:var(--gold)}
#loading p{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--mut);letter-spacing:2px}
@keyframes ldPulse{0%,100%{opacity:.4}50%{opacity:1}}
#loading p{animation:ldPulse 1.5s ease-in-out infinite}

#app{display:none;height:100vh;width:100vw;overflow:hidden;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

.topbar{height:70px;min-height:70px;background:var(--bg2);border-bottom:2px solid rgba(255,214,0,.1);display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.tb-left{display:flex;flex-direction:column;justify-content:center}
.tb-left .t1{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:5px;color:var(--gold);text-shadow:0 0 20px rgba(255,214,0,.2)}
.tb-left .t2{font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:1px}
.topbar .ph{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 10px rgba(255,214,0,.15)}
.topbar .clk{font-family:'Share Tech Mono',monospace;font-size:1.3rem;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,.2)}

.nav{height:50px;min-height:50px;background:var(--bg);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 40px;gap:6px}
.nb{font-family:var(--font);font-weight:700;font-size:1rem;letter-spacing:2px;text-transform:uppercase;padding:8px 22px;border:1px solid var(--brd);border-radius:5px;background:transparent;color:var(--mut);cursor:pointer;transition:all .15s}
.nb:hover{border-color:rgba(0,229,255,.3);color:var(--txt)}
.nb.on{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.4);color:var(--cyan)}

.content{flex:1;overflow:hidden;position:relative}
.vw{position:absolute;inset:0;overflow-y:auto;padding:24px 40px;display:none}
.vw.on{display:block}
.vw::-webkit-scrollbar{width:5px}
.vw::-webkit-scrollbar-thumb{background:rgba(0,229,255,.12);border-radius:3px}

/* STANDINGS */
.pr{display:grid;grid-template-columns:1fr 1fr;gap:28px;height:100%}
.pc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.pch{padding:14px 24px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:1rem;letter-spacing:3px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.pch.a{background:linear-gradient(135deg,rgba(0,229,255,.1),transparent);border-bottom:2px solid rgba(0,229,255,.12);color:var(--cyan)}
.pch.b{background:linear-gradient(135deg,rgba(255,0,153,.1),transparent);border-bottom:2px solid rgba(255,0,153,.12);color:var(--mag)}
.pch .cnt{font-family:'Share Tech Mono',monospace;font-size:.75rem;opacity:.5}
.top4-badge{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--grn);border:1px solid rgba(0,255,136,.4);border-radius:4px;padding:2px 8px;letter-spacing:1px;text-transform:uppercase;opacity:.8}
.st-row.q-last{border-bottom:2px dashed rgba(0,255,136,.35)!important}

.st-wrap{flex:1;overflow-y:auto}
.st-hdr{display:grid;grid-template-columns:50px 1fr 56px 56px 60px 60px 60px 64px;padding:8px 20px;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--brd);background:var(--bg2);position:sticky;top:0;z-index:2}
.st-hdr span{text-align:center}
.st-hdr span:nth-child(2){text-align:left}

.st-body{position:relative}

.st-row{display:grid;grid-template-columns:50px 1fr 56px 56px 60px 60px 60px 64px;padding:0 20px;height:var(--row-h);align-items:center;font-size:1.35rem;font-weight:700;border-bottom:1px solid var(--brd);position:absolute;left:0;right:0;transition:transform .8s cubic-bezier(.3,.0,.15,1),background .5s;will-change:transform}
.st-row span{text-align:center}
.st-row span:nth-child(2){text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:1.45rem;font-weight:800;letter-spacing:1px}

.st-row .rk{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:800;color:var(--mut)}
.st-row .pv{color:var(--gold);font-weight:900;font-size:1.55rem;text-shadow:0 0 8px rgba(255,214,0,.3)}
.st-row .stat{font-family:'Share Tech Mono',monospace;font-size:1.15rem}
.st-row .rw-v{color:var(--grn)}
.st-row .rl-v{color:var(--red)}
.st-row.q{background:rgba(0,255,136,.07);border-left:3px solid var(--grn)}
.st-row.q .rk{color:var(--grn);text-shadow:0 0 8px rgba(0,255,136,.5);font-size:1.2rem}
.st-row.q span:nth-child(2){color:#fff}

@keyframes rowFlash{0%{background:rgba(0,229,255,.2)}100%{background:transparent}}
.st-row.flash{animation:rowFlash 1.8s ease-out}
.st-row.q.flash{animation:rowFlashQ 1.8s ease-out}
@keyframes rowFlashQ{0%{background:rgba(0,255,136,.25)}100%{background:rgba(0,255,136,.04)}}

.rank-change{font-size:.65rem;margin-left:5px;display:inline-block;animation:fadeArrow 3s ease-out forwards}
.rank-up{color:var(--grn)}
.rank-down{color:var(--red)}
@keyframes fadeArrow{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* BRACKET TREE */
.bracket-container{padding:20px 10px 40px;overflow-x:auto;min-width:900px}
.bracket-tree{display:flex;align-items:center;gap:0;width:100%;min-height:600px}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;position:relative}
.bracket-col.col-qf{gap:12px}
.bracket-col.col-sf{gap:60px}
.bracket-col.col-final{gap:20px;flex:0.8}

/* Connector lines */
.bracket-col::after{content:none}
.bk-connector{position:absolute;top:0;left:100%;width:28px;height:100%;pointer-events:none;z-index:0}

/* Match card */
.bm{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;position:relative;z-index:2;transition:border-color .3s,box-shadow .3s}
.bm:hover{border-color:rgba(0,229,255,.3);box-shadow:0 0 16px rgba(0,229,255,.08)}
.bm-l{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--mut);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.bm-t{display:flex;align-items:center;padding:7px 10px;border-radius:6px;background:var(--bg3);font-size:1rem;font-weight:800;margin-bottom:3px;letter-spacing:.5px;gap:8px;transition:background .4s,color .4s}
.bm-t.w{background:rgba(0,255,136,.13);color:var(--grn);border:1px solid rgba(0,255,136,.25)}
.bm-t.tbd{color:var(--mut);font-style:italic}
.bm-t .sc{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--gold);margin-left:auto;min-width:18px;text-align:right}
.bm-t .tm-logo{width:24px;height:24px;object-fit:contain;border-radius:3px;flex-shrink:0}
.bm-t .tm-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm-sep{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.48rem;color:var(--mut);padding:1px 0;letter-spacing:2px}
.bm.bm-finale{border-color:rgba(255,214,0,.35);box-shadow:0 0 20px rgba(255,214,0,.1)}
.bm.bm-petite{border-color:rgba(205,127,50,.3)}

/* Advance animation */
@keyframes advanceTeam{0%{transform:scale(1);background:rgba(0,229,255,.0)}30%{transform:scale(1.04);background:rgba(0,229,255,.18)}100%{transform:scale(1);background:rgba(0,255,136,.13)}}
.bm-t.just-advanced{animation:advanceTeam .9s ease-out forwards}

/* Round labels */
.round-label{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:6px 0 14px;color:var(--mut)}
.round-label.qf{color:rgba(0,229,255,.7)}
.round-label.sf{color:rgba(255,0,153,.7)}
.round-label.fi{color:var(--gold)}
.round-label.pf{color:rgba(205,127,50,.8)}

/* SVG connector styling */
.bk-svg{position:absolute;left:100%;top:0;height:100%;width:32px;overflow:visible;pointer-events:none}

.glow{height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--mag),transparent);margin:22px 0;opacity:.2}

/* PODIUM FULLSCREEN ANIMATION */
#podium-overlay{position:fixed;inset:0;background:rgba(5,5,9,.96);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
#podium-overlay.active{opacity:1;pointer-events:all}
#podium-overlay .podium-close{position:absolute;top:24px;right:32px;font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;color:var(--mut);cursor:pointer;padding:8px 16px;border:1px solid var(--brd);border-radius:4px;transition:color .2s,border-color .2s}
#podium-overlay .podium-close:hover{color:var(--txt);border-color:rgba(0,229,255,.4)}

.podium-title-big{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,3vw,2rem);font-weight:900;letter-spacing:6px;color:var(--gold);text-shadow:0 0 40px rgba(255,214,0,.6);text-align:center;margin-bottom:48px;opacity:0;transform:translateY(-20px);transition:opacity .7s .1s,transform .7s .1s}
.podium-title-big.show{opacity:1;transform:translateY(0)}

.podium-stage{display:flex;align-items:flex-end;justify-content:center;gap:20px;margin-bottom:20px}
.pa-spot{text-align:center;border-radius:12px 12px 0 0;padding:24px 32px 18px;min-width:180px;opacity:0;transform:translateY(80px) scale(.9);transition:opacity .8s ease, transform .8s cubic-bezier(.2,.8,.3,1),box-shadow .8s}
.pa-spot.show{opacity:1;transform:translateY(0) scale(1)}
.pa-spot .pa-logo{width:90px;height:90px;object-fit:contain;border-radius:10px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;filter:drop-shadow(0 0 12px rgba(255,214,0,.3))}
.pa-spot .pa-rank{font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:900;display:block;line-height:1}
.pa-spot .pa-name{font-size:1.2rem;font-weight:900;margin-top:8px;display:block;letter-spacing:1px}
.pa-spot .pa-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;margin-top:6px;display:block}
.pa-1{background:linear-gradient(180deg,rgba(255,214,0,.22),rgba(255,214,0,.06));border:1px solid rgba(255,214,0,.4);border-bottom:none;height:220px;order:2;box-shadow:0 0 0 rgba(255,214,0,0)}
.pa-1.show{box-shadow:0 0 60px rgba(255,214,0,.25)}
.pa-1 .pa-rank{color:var(--gold);text-shadow:0 0 30px rgba(255,214,0,.7)}
.pa-1 .pa-name{color:var(--gold)}
.pa-1 .pa-label{color:rgba(255,214,0,.6)}
.pa-2{background:linear-gradient(180deg,rgba(192,192,208,.14),rgba(192,192,208,.04));border:1px solid rgba(192,192,208,.25);border-bottom:none;height:175px;order:1}
.pa-2 .pa-rank{color:var(--silver);text-shadow:0 0 20px rgba(192,192,208,.5)}
.pa-2 .pa-name{color:var(--silver)}
.pa-2 .pa-label{color:rgba(192,192,208,.5)}
.pa-3{background:linear-gradient(180deg,rgba(205,127,50,.16),rgba(205,127,50,.05));border:1px solid rgba(205,127,50,.25);border-bottom:none;height:145px;order:3}
.pa-3 .pa-rank{color:var(--bronze);text-shadow:0 0 20px rgba(205,127,50,.5)}
.pa-3 .pa-name{color:var(--bronze)}
.pa-3 .pa-label{color:rgba(205,127,50,.5)}

/* confetti */
.confetti-piece{position:fixed;top:-10px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

#qr-widget{position:fixed;bottom:24px;right:24px;z-index:500;background:rgba(10,10,22,.92);border:1px solid rgba(255,214,0,.2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(8px);}
#qr-widget:hover{border-color:rgba(255,214,0,.5);box-shadow:0 0 20px rgba(255,214,0,.1);}
#qr-widget .qr-box{background:#fff;padding:8px;border-radius:4px;}
#qr-widget .qr-box canvas,#qr-widget .qr-box img{display:block;width:96px!important;height:96px!important;}
#qr-widget .qr-label{font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,214,0,.7);text-align:center;}
#qr-widget .qr-url{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:rgba(255,255,255,.3);text-align:center;}

#qr-widget{position:fixed;bottom:24px;right:24px;z-index:500;background:rgba(8,8,8,.95);border:1px solid rgba(224,90,58,.3);border-top:2px solid #E05A3A;padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(8px);}
#qr-widget .qr-box{background:#fff;padding:8px;}
#qr-widget .qr-box canvas,#qr-widget .qr-box img{display:block;width:100px!important;height:100px!important;}
#qr-widget .qr-label{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:3px;text-transform:uppercase;color:#E05A3A;text-align:center;}
#qr-widget .qr-url{font-family:'Share Tech Mono',monospace;font-size:.45rem;color:rgba(255,255,255,.3);text-align:center;letter-spacing:1px;}
</style>
</head>
<body>

<div id="loading">
  <h1>SAVIGNY MAJOR CUP</h1>
  <p>En attente du lancement du tournoi...</p>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-left"><div class="t1">SAVIGNY MAJOR CUP</div><div class="t2">EVA SENART LEAGUE</div></div>
    <div class="ph" id="phL">PHASE DE POULES</div>
    <div class="clk" id="clk"></div>
  </div>
  <div class="nav">
    <button class="nb on" data-v="S">Classements</button>
    <button class="nb" data-v="B">Bracket</button>
  </div>
  <div class="content">
    <div class="vw on" id="vS"></div>
    <div class="vw" id="vB"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyCledoOZLCns1tBxGO3OIhcsjvFpBFYCss",
  authDomain:"savigny-cups.firebaseapp.com",
  databaseURL:"https://savigny-cups-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"savigny-cups",
  storageBucket:"savigny-cups.firebasestorage.app",
  messagingSenderId:"1000985455974",
  appId:"1:1000985455974:web:14ea84601120553d7ceca7"
});
const db=getDatabase(app);

const ROW_H=68;
let state=null,prevRank={A:{},B:{}},flashTeams=new Set(),lastStateJSON='';

// Nav
document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));this.classList.add('on');
  document.querySelectorAll('.vw').forEach(v=>v.classList.remove('on'));
  document.getElementById('v'+this.dataset.v).classList.add('on');
  document.getElementById('phL').textContent=this.dataset.v==='S'?'PHASE DE POULES':'WINNER BRACKET';
}));

// Clock
(function ck(){const e=document.getElementById('clk');const u=()=>{const d=new Date();e.textContent=`${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`};u();setInterval(u,10000)})();

// Listen to Firebase
onValue(ref(db,'tournament'),snap=>{
  const d=snap.val();
  if(!d||!d.started){document.getElementById('loading').classList.remove('hidden');document.getElementById('app').classList.remove('on');return}
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.add('on');

  const newJSON=JSON.stringify(d);
  // Detect which teams changed
  if(state&&state.sta&&d.sta){
    ['A','B'].forEach(p=>{
      if(!state.sta[p]||!d.sta[p])return;
      Object.keys(d.sta[p]).forEach(t=>{
        if(!state.sta[p][t])return;
        if(JSON.stringify(state.sta[p][t])!==JSON.stringify(d.sta[p][t]))flashTeams.add(t);
      });
    });
  }

  state=d;
  if(!prevRank.A||Object.keys(prevRank.A).length===0){
    if(state.pA)state.pA.forEach((t,i)=>{prevRank.A[t]=i});
    if(state.pB)state.pB.forEach((t,i)=>{prevRank.B[t]=i});
  }
  renderStandings();
  renderBracket();
  lastStateJSON=newJSON;
});

function gS(pid){
  if(!state||!state.sta||!state.sta[pid])return[];
  return Object.entries(state.sta[pid]).sort((a,b)=>{
    if(b[1].pts!==a[1].pts)return b[1].pts-a[1].pts;
    const da=a[1].rw-a[1].rl,db=b[1].rw-b[1].rl;
    if(db!==da)return db-da;
    return b[1].rw-a[1].rw;
  });
}

function renderStandings(){
  if(!state)return;
  const mA=state.mA||[],mBp=state.mBp||[];
  const dA=mA.filter(m=>m.done).length,dB=mBp.filter(m=>m.done).length;
  const pA=state.pA||[],pB=state.pB||[];

  if(!document.getElementById('sBodyA')){
    document.getElementById('vS').innerHTML=`<div class="pr">
      <div class="pc"><div class="pch a"><span>POULE A — ARÈNE A</span><span style="display:flex;align-items:center;gap:10px"><span class="top4-badge">✦ TOP 4</span><span class="cnt" id="cntA">${dA}/${mA.length}</span></span></div>
        <div class="st-wrap"><div class="st-hdr"><span>#</span><span>ÉQUIPE</span><span>V</span><span>D</span><span>RW</span><span>RL</span><span>±</span><span>PTS</span></div>
        <div class="st-body" id="sBodyA" style="height:${pA.length*ROW_H}px"></div></div></div>
      <div class="pc"><div class="pch b"><span>POULE B — ARÈNE B</span><span style="display:flex;align-items:center;gap:10px"><span class="top4-badge">✦ TOP 4</span><span class="cnt" id="cntB">${dB}/${mBp.length}</span></span></div>
        <div class="st-wrap"><div class="st-hdr"><span>#</span><span>ÉQUIPE</span><span>V</span><span>D</span><span>RW</span><span>RL</span><span>±</span><span>PTS</span></div>
        <div class="st-body" id="sBodyB" style="height:${pB.length*ROW_H}px"></div></div></div>
    </div>`;
    createRows('sBodyA','A',pA);createRows('sBodyB','B',pB);
  }
  document.getElementById('cntA').textContent=`${dA}/${mA.length}`;
  document.getElementById('cntB').textContent=`${dB}/${mBp.length}`;
  animateRanks('A');animateRanks('B');
}

function createRows(cid,pid,pool){
  const c=document.getElementById(cid);if(!c)return;
  pool.forEach((name,i)=>{
    const row=document.createElement('div');row.className='st-row';
    row.id=`row-${pid}-${name.replace(/[^a-zA-Z0-9]/g,'_')}`;
    row.style.transform=`translateY(${i*ROW_H}px)`;
    const d=state.sta[pid][name]||{w:0,l:0,pts:0,rw:0,rl:0};
    row.innerHTML=rowHTML(name,d,i);c.appendChild(row);
  });
}

function rowHTML(name,d,rank){
  const diff=d.rw-d.rl;const ds=diff>0?`+${diff}`:`${diff}`;const q=rank<4;
  const logo=teamLogo(name);
  const logoHtml=logo?`<img src="${logo}" style="width:32px;height:32px;object-fit:contain;border-radius:4px;margin-right:6px;vertical-align:middle;flex-shrink:0;">`:'';
  return`<span class="rk">${rank+1}</span>
    <span style="display:flex;align-items:center;">${logoHtml}<span>${name}${q?' <span style="color:var(--grn);font-size:.8rem">✦</span>':''}</span></span>
    <span class="stat">${d.w}</span><span class="stat">${d.l}</span>
    <span class="stat rw-v">${d.rw}</span><span class="stat rl-v">${d.rl}</span>
    <span class="stat" style="color:${diff>=0?'var(--grn)':'var(--red)'}">${ds}</span>
    <span class="pv">${d.pts}</span>`;
}

function animateRanks(pid){
  const sorted=gS(pid);const prev=prevRank[pid];
  sorted.forEach(([name,d],ni)=>{
    const rid=`row-${pid}-${name.replace(/[^a-zA-Z0-9]/g,'_')}`;
    const row=document.getElementById(rid);if(!row)return;
    const oi=prev[name]!==undefined?prev[name]:ni;
    const isF=flashTeams.has(name);
    row.innerHTML=rowHTML(name,d,ni);
    if(oi!==ni&&isF){
      const rk=row.querySelector('.rk');const delta=oi-ni;
      rk.innerHTML+=delta>0?`<span class="rank-change rank-up">▲${delta}</span>`:`<span class="rank-change rank-down">▼${Math.abs(delta)}</span>`;
    }
    row.style.transform=`translateY(${ni*ROW_H}px)`;
    row.className='st-row'+(ni<4?' q':'')+(ni===3?' q-last':'');
    if(isF){row.classList.add('flash');setTimeout(()=>row.classList.remove('flash'),2000)}
    prev[name]=ni;
  });
  flashTeams.clear();
}

function renderBracket(){
  const v=document.getElementById('vB');
  if(!state||!state.bk){
    v.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mut);font-family:'Orbitron',sans-serif;font-size:1rem;letter-spacing:4px;text-align:center">TERMINEZ LES POULES<br>POUR DÉBLOQUER LE BRACKET</div>`;return;
  }
  if(state.bk.qf&&!Array.isArray(state.bk.qf))state.bk.qf=Object.values(state.bk.qf);
  if(state.bk.sf&&!Array.isArray(state.bk.sf))state.bk.sf=Object.values(state.bk.sf);
  if(!state.bk.qf||!state.bk.qf[0]||!state.bk.qf[0].tA){
    v.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mut);font-family:'Orbitron',sans-serif;font-size:1rem;letter-spacing:4px;text-align:center">TERMINEZ LES POULES<br>POUR DÉBLOQUER LE BRACKET</div>`;return;
  }
  const bk=state.bk;

  // Build set of "newly advanced" teams: winners who appear in next round
  const advancedTeams=new Set();
  if(bk.qf&&bk.sf){
    bk.qf.forEach(m=>{
      if(m&&m.done){
        const w=m.sA>m.sB?m.tA:m.tB;
        // check if this winner appears in SF
        if(bk.sf.some(s=>s&&(s.tA===w||s.tB===w))) advancedTeams.add(w);
      }
    });
  }
  if(bk.sf&&bk.fi){
    bk.sf.forEach(m=>{
      if(m&&m.done){
        const w=m.sA>m.sB?m.tA:m.tB;
        if(bk.fi&&(bk.fi.tA===w||bk.fi.tB===w)) advancedTeams.add(w);
      }
    });
  }

  function teamSlot(name,won,done,sc,isWinner){
    if(!name)return`<div class="bm-t tbd"><span class="tm-name">TBD</span></div>`;
    const logo=teamLogo(name);
    const img=logo?`<img class="tm-logo" src="${logo}">`:'' ;
    // isWinner = this team just advanced (show advance anim)
    let cls='bm-t';
    if(won) cls+=' w';
    if(isWinner) cls+=' just-advanced';
    return`<div class="${cls}">${img}<span class="tm-name">${name}</span>${done?`<span class="sc">${sc}</span>`:''}</div>`;
  }

  function matchCard(m,extraClass=''){
    if(!m||!m.tA)return`<div class="bm${extraClass?' '+extraClass:''}"><div class="bm-l">—</div>${teamSlot(null)}<div class="bm-sep">VS</div>${teamSlot(null)}</div>`;
    const wA=m.done&&m.sA>m.sB,wB=m.done&&m.sB>m.sA;
    // "just-advanced" = winner of THIS match who appears in the NEXT round
    const advA=wA&&advancedTeams.has(m.tA);
    const advB=wB&&advancedTeams.has(m.tB);
    return`<div class="bm${extraClass?' '+extraClass:''}">
      <div class="bm-l">${m.l||''}</div>
      ${teamSlot(m.tA,wA,m.done,m.sA,advA)}
      <div class="bm-sep">VS</div>
      ${teamSlot(m.tB||null,wB,m.done,m.sB,advB)}
    </div>`;
  }

  let first=null,second=null,third=null;
  if(bk.fi&&bk.fi.done){first=bk.fi.sA>bk.fi.sB?bk.fi.tA:bk.fi.tB;second=bk.fi.sA>bk.fi.sB?bk.fi.tB:bk.fi.tA}
  if(bk.pf&&bk.pf.done){third=bk.pf.sA>bk.pf.sB?bk.pf.tA:bk.pf.tB}

  v.innerHTML=`
  <div style="padding:16px 24px 40px;overflow-x:auto">
    <div style="display:flex;align-items:stretch;min-width:860px;gap:0;position:relative">

      <!-- QF col -->
      <div style="flex:1.2;display:flex;flex-direction:column;gap:16px;position:relative">
        <div class="round-label qf">QUARTS DE FINALE</div>
        <div style="display:flex;flex-direction:column;gap:16px;flex:1">
          ${bk.qf.map(m=>matchCard(m)).join('')}
        </div>
        <!-- connector QF→SF -->
        <svg style="position:absolute;left:100%;top:42px;height:calc(100% - 42px);width:36px;z-index:1;overflow:visible" preserveAspectRatio="none" viewBox="0 0 36 400">
          <path d="M0,50 H18 V100" stroke="rgba(0,229,255,.3)" stroke-width="1.5" fill="none"/>
          <path d="M0,150 H18 V100" stroke="rgba(0,229,255,.3)" stroke-width="1.5" fill="none"/>
          <path d="M18,100 H36" stroke="rgba(0,229,255,.4)" stroke-width="1.5" fill="none"/>
          <path d="M0,250 H18 V300" stroke="rgba(255,0,153,.3)" stroke-width="1.5" fill="none"/>
          <path d="M0,350 H18 V300" stroke="rgba(255,0,153,.3)" stroke-width="1.5" fill="none"/>
          <path d="M18,300 H36" stroke="rgba(255,0,153,.4)" stroke-width="1.5" fill="none"/>
        </svg>
      </div>

      <div style="width:36px;flex-shrink:0"></div>

      <!-- SF col -->
      <div style="flex:1;display:flex;flex-direction:column;position:relative">
        <div class="round-label sf">DEMI-FINALES</div>
        <div style="display:flex;flex-direction:column;gap:0;flex:1;justify-content:space-around">
          ${bk.sf.map(m=>`<div style="position:relative">${matchCard(m)}</div>`).join('')}
        </div>
        <!-- connector SF→FI -->
        <svg style="position:absolute;left:100%;top:42px;height:calc(100% - 42px);width:36px;z-index:1;overflow:visible" preserveAspectRatio="none" viewBox="0 0 36 400">
          <path d="M0,100 H18 V200" stroke="rgba(255,214,0,.3)" stroke-width="1.5" fill="none"/>
          <path d="M0,300 H18 V200" stroke="rgba(255,214,0,.3)" stroke-width="1.5" fill="none"/>
          <path d="M18,200 H36" stroke="rgba(255,214,0,.5)" stroke-width="2" fill="none"/>
        </svg>
      </div>

      <div style="width:36px;flex-shrink:0"></div>

      <!-- Finale col -->
      <div style="flex:1;display:flex;flex-direction:column">
        <div class="round-label fi">★ GRANDE FINALE</div>
        <div style="display:flex;flex-direction:column;justify-content:center;flex:1">
          ${matchCard(bk.fi,'bm-finale')}
        </div>
      </div>

    </div>

    <!-- Petite finale below -->
    <div style="margin-top:28px;max-width:420px">
      <div class="round-label pf">PETITE FINALE — 3ÈME PLACE</div>
      ${matchCard(bk.pf,'bm-petite')}
    </div>

    ${first&&third?`<div class="glow" style="margin-top:32px"></div>
    <div style="text-align:center;margin-top:12px">
      <button id="btn-podium" style="font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;background:linear-gradient(135deg,var(--gold),#bb9900);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700;box-shadow:0 0 20px rgba(255,214,0,.3)">🏆 VOIR LE PODIUM</button>
    </div>`:''}
  </div>
  `;

  // Wire up podium button AFTER innerHTML is set (avoids ES module scope issue)
  const btnPodium=document.getElementById('btn-podium');
  if(btnPodium&&first&&third){
    btnPodium.addEventListener('click',()=>openPodiumOverlay(third,second,first));
  }
}

function teamLogo(name){
  // fuzzy match: try exact, then case-insensitive, then partial
  if(TEAM_LOGOS[name]) return TEAM_LOGOS[name];
  const low = name.toLowerCase();
  for(const k of Object.keys(TEAM_LOGOS)){
    if(k.toLowerCase()===low) return TEAM_LOGOS[k];
  }
  for(const k of Object.keys(TEAM_LOGOS)){
    if(low.includes(k.toLowerCase())||k.toLowerCase().includes(low)) return TEAM_LOGOS[k];
  }
  return null;
}


/* ---- PODIUM OVERLAY ---- */
function openPodiumOverlay(third,second,first){
  // Create overlay if not exists
  let ov=document.getElementById('podium-overlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='podium-overlay';
    const closeBtn=document.createElement('div');
    closeBtn.className='podium-close';
    closeBtn.textContent='✕ FERMER';
    closeBtn.onclick=()=>{ov.classList.remove('active')};
    ov.appendChild(closeBtn);
    document.body.appendChild(ov);
    // Close on backdrop click
    ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('active')});
  }

  const l3=teamLogo(third),l2=teamLogo(second),l1=teamLogo(first);
  const img=n=>n?`<img class="pa-logo" src="${n}" onerror="this.style.display='none'">`:'<div style="width:90px;height:90px;margin:0 auto 12px"></div>';

  // Build content (preserve close button)
  const closeEl=ov.querySelector('.podium-close');
  ov.innerHTML='';
  ov.appendChild(closeEl);

  const title=document.createElement('div');
  title.className='podium-title-big';
  title.innerHTML='🏆 SAVIGNY MAJOR CUP — PODIUM 🏆';
  ov.appendChild(title);

  const stage=document.createElement('div');
  stage.className='podium-stage';
  stage.innerHTML=`
    <div class="pa-spot pa-2" id="pa2">${img(l2)}<span class="pa-rank">2</span><span class="pa-name">${second}</span><span class="pa-label">Finaliste</span></div>
    <div class="pa-spot pa-1" id="pa1">${img(l1)}<span class="pa-rank">1</span><span class="pa-name">${first}</span><span class="pa-label">🏆 Champion</span></div>
    <div class="pa-spot pa-3" id="pa3">${img(l3)}<span class="pa-rank">3</span><span class="pa-name">${third}</span><span class="pa-label">3ème place</span></div>`;
  ov.appendChild(stage);

  ov.classList.add('active');
  // Sequential reveal
  requestAnimationFrame(()=>{
    setTimeout(()=>title.classList.add('show'),100);
    setTimeout(()=>document.getElementById('pa3').classList.add('show'),500);
    setTimeout(()=>document.getElementById('pa2').classList.add('show'),1300);
    setTimeout(()=>{
      document.getElementById('pa1').classList.add('show');
      launchConfetti();
    },2100);
  });
}

function launchPodiumAnimation(third,second,first){
  // Auto-show inline preview at bottom of bracket, then full overlay
  openPodiumOverlay(third,second,first);
}

function launchConfetti(){
  const colors=['#ffd600','#00e5ff','#ff0099','#00ff88','#fff','#ff3355'];
  for(let i=0;i<140;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      const size=Math.random()*12+6;
      el.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size*0.55}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:2px;animation-duration:${Math.random()*2.5+1.5}s;animation-delay:${Math.random()*0.8}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*25);
  }
}

window.openPodiumOverlay=openPodiumOverlay;


</script>
